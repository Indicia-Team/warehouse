<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Indicia Warehouse Maintenance</title>
<style>
    body {
        margin: 0;
        padding: 0;
        background: #f2f2f2;
        font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        color: #333;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
    }
    .box {
        background: white;
        padding: 40px 60px;
        border-radius: 12px;
        box-shadow: 0 0 25px rgba(0,0,0,0.1);
        text-align: center;
        max-width: 600px;
    }
    h1 {
        margin-top: 0;
        font-size: 2rem;
        color: #2d6a9f;
    }
    p {
        font-size: 1.15rem;
        line-height: 1.6;
    }
    .spinner {
        margin: 20px auto;
        width: 48px;
        height: 48px;
        border: 5px solid #e0e0e0;
        border-top: 5px solid #2d6a9f;
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }
    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
</style>
</head>
<body>
    <div class="box">
        <div class="spinner"></div>
        <h1>Scheduled Maintenance</h1>
        <p>
            The Indicia Warehouse is currently offline while we perform an essential update.
            <br><br>
            This process may take a little while. Please check back again later.
        </p>
        <p style="font-size:0.95rem;color:#777;">Thank you for your patience.</p>
    </div>
</body>
</html>
